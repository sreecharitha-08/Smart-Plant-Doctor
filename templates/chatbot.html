<!DOCTYPE html>
<html>
<head>
    <title>Smart Plant Doctor Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8f5e9;
            margin: 0;
            padding: 20px;
        }

        .chat-container {
            width: 600px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .chat-header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f1f8e9;
        }

        .message {
            margin: 10px 0;
        }

        .user {
            text-align: right;
            color: #1b5e20;
            font-weight: bold;
        }

        .bot {
            text-align: left;
            color: #0d47a1;
            font-weight: bold;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .chat-input button {
            padding: 12px 20px;
            border: none;
            background: #43a047;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-input button:hover {
            background: #2e7d32;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🌱 Smart Plant Doctor Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Bot: Hello! I am your Plant Doctor 🌿 Ask me about plant diseases, care, watering, or fertilizers.
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about your plant problem...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const userText = inputField.value.trim();

    if (userText === "") return;

    // Show user message
    chatBox.innerHTML += `<div class="message user">You: ${userText}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
    inputField.value = "";

    try {
        // 🔥 IMPORTANT: This must match app.py route (/ask)
        const response = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: userText })
        });

        const data = await response.json();

        // Show bot reply
        chatBox.innerHTML += `<div class="message bot">Bot: ${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        chatBox.innerHTML += `<div class="message bot">Bot: Server connection error.</div>`;
    }
}

// Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
